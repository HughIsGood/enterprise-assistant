<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>企业知识助手</title>
    <style>
        :root {
            --bg: #f2f6fb;
            --card: #ffffff;
            --text: #14213d;
            --muted: #4f5d75;
            --primary: #1565c0;
            --primary-hover: #0d47a1;
            --secondary: #197a43;
            --secondary-hover: #0f5a2f;
            --danger: #b00020;
            --ok: #1b5e20;
            --border: #d6deeb;
            --assistant-bg: #f0f7ff;
            --user-bg: #ecf7ec;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top left, #dfe9f5 0%, var(--bg) 45%, #edf3fb 100%);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 16px;
        }

        .app-title {
            width: 100%;
            max-width: 760px;
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 1px;
            margin: 0 0 8px;
            text-align: left;
        }

        .container {
            width: 100%;
            max-width: 760px;
            display: grid;
            gap: 16px;
        }

        .card {
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 14px 30px rgba(10, 41, 78, 0.08);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 22px;
        }

        p {
            margin: 0 0 16px;
            color: var(--muted);
            font-size: 14px;
        }

        .row {
            display: grid;
            gap: 12px;
        }

        input[type="file"],
        input[type="text"],
        select,
        textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            background: #fbfdff;
            font-size: 14px;
            color: var(--text);
        }

        input[type="file"] {
            border-style: dashed;
        }

        textarea {
            resize: vertical;
            min-height: 90px;
        }

        button {
            border: 0;
            border-radius: 10px;
            padding: 12px 16px;
            background: var(--primary);
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .btn-secondary {
            background: var(--secondary);
        }

        button:hover:enabled { background: var(--primary-hover); }
        .btn-secondary:hover:enabled { background: var(--secondary-hover); }
        button:disabled { opacity: 0.65; cursor: not-allowed; }

        .status {
            margin-top: 10px;
            min-height: 20px;
            font-size: 14px;
            color: var(--muted);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .status.ok { color: var(--ok); }
        .status.err { color: var(--danger); }

        .chat-log {
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #fbfdff;
            padding: 12px;
            min-height: 220px;
            max-height: 360px;
            overflow-y: auto;
            display: grid;
            gap: 10px;
        }

        .msg {
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .msg.user {
            background: var(--user-bg);
            border: 1px solid #cde8cd;
        }

        .msg.assistant {
            background: var(--assistant-bg);
            border: 1px solid #cadff5;
        }

        .msg .role {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .chat-buttons {
            display: grid;
            grid-template-columns: repeat(2, minmax(120px, 1fr));
            gap: 12px;
        }


        .timeline {
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #fbfdff;
            padding: 12px;
            display: grid;
            gap: 10px;
        }

        .timeline-title {
            font-size: 13px;
            color: var(--muted);
            margin: 0;
        }

        .timeline-track {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 8px;
        }

        .timeline-node {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px;
            font-size: 12px;
            text-align: center;
            background: #f8fbff;
            color: var(--muted);
        }

        .timeline-node.done {
            border-color: #9cd3ab;
            background: #ecf7ec;
            color: var(--ok);
        }

        .timeline-node.active {
            border-color: #8ab5ea;
            background: #eef5ff;
            color: var(--primary);
            font-weight: 600;
        }

        .timeline-meta {
            font-size: 12px;
            color: var(--muted);
            white-space: pre-wrap;
            word-break: break-word;
            min-height: 16px;
        }

        @media (max-width: 640px) {
            .card { padding: 16px; }
            .chat-buttons { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<h1 class="app-title">企业知识助手系统</h1>
<div class="container">
    <div class="card">
        <h1>文档上传</h1>
        <p>上传文档到 <code>/api/documents/upload</code> 做知识入库。</p>

        <div class="row">
            <input id="fileInput" type="file" />
            <select id="docTypeSelect">
                <option value="POLICY">POLICY</option>
                <option value="TECH_TYPE">TECH_TYPE</option>
                <option value="SOP">SOP</option>
                <option value="FAQ">FAQ</option>
            </select>
            <button id="uploadBtn" type="button">上传文档</button>
        </div>

        <div id="uploadStatus" class="status"></div>
    </div>

    <div class="card">
        <h1>模型对话</h1>
        <p>
            Agent 问答：<code>/api/chat/agent/ask</code><br/>
            审批接口：<code>/api/chat/agent/approve</code>（Agent 返回 ACTION_REQUEST 后会弹窗确认）
        </p>

        <div class="row">
            <input id="userIdInput" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="请输入数字 userId（留空默认 666）" />
            <div id="chatLog" class="chat-log"></div>
            <textarea id="messageInput" placeholder="请输入你的问题"></textarea>
            <div class="chat-buttons">
                <button id="agentAskBtn" type="button" class="btn-secondary">Agent 问答</button>
            </div>
        </div>

        <div id="chatStatus" class="status"></div>


        <div class="timeline">
            <p class="timeline-title">&#x4EFB;&#x52A1;&#x65F6;&#x95F4;&#x7EBF;&#xFF08;plan -&gt; approval -&gt; execute -&gt; end&#xFF09;</p>
            <div class="timeline-track">
                <div id="timelinePlan" class="timeline-node">plan</div>
                <div id="timelineApproval" class="timeline-node">approval</div>
                <div id="timelineExecute" class="timeline-node">execute</div>
                <div id="timelineEnd" class="timeline-node">end</div>
            </div>
            <div id="timelineMeta" class="timeline-meta"></div>
        </div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const uploadStatusEl = document.getElementById('uploadStatus');
    const docTypeSelect = document.getElementById('docTypeSelect');

    const userIdInput = document.getElementById('userIdInput');
    const messageInput = document.getElementById('messageInput');
    const agentAskBtn = document.getElementById('agentAskBtn');
    const chatLog = document.getElementById('chatLog');
    const chatStatusEl = document.getElementById('chatStatus');

    const timelinePlanEl = document.getElementById('timelinePlan');
    const timelineApprovalEl = document.getElementById('timelineApproval');
    const timelineExecuteEl = document.getElementById('timelineExecute');
    const timelineEndEl = document.getElementById('timelineEnd');
    const timelineMetaEl = document.getElementById('timelineMeta');

    let pendingClarificationTaskId = null;
    let activeTaskId = null;
    let timelinePollingTimer = null;

    function setStatus(el, text, type) {
        el.textContent = text;
        el.className = 'status';
        if (type) {
            el.classList.add(type);
        }
    }

    function appendMessage(role, content) {
        const item = document.createElement('div');
        item.className = `msg ${role}`;

        const roleEl = document.createElement('span');
        roleEl.className = 'role';
        roleEl.textContent = role === 'user' ? '\u4f60' : '\u52a9\u624b';

        const contentEl = document.createElement('div');
        contentEl.textContent = content;

        item.appendChild(roleEl);
        item.appendChild(contentEl);
        chatLog.appendChild(item);
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    function parseResponsePayload(response, payload) {
        if (!response.ok) {
            const errMsg = typeof payload === 'string' ? payload : JSON.stringify(payload);
            throw new Error(errMsg || '\u8bf7\u6c42\u5931\u8d25');
        }
        return payload;
    }

    function resolveUserId() {
        let userId = userIdInput.value.trim();
        if (!userId) {
            userId = '666';
            userIdInput.value = userId;
        }
        if (!/^\d+$/.test(userId)) {
            throw new Error('userId \u53ea\u80fd\u662f\u6570\u5b57');
        }
        return userId;
    }



    function setTimelineNode(el, state, text) {
        el.className = 'timeline-node';
        if (state) {
            el.classList.add(state);
        }
        if (text) {
            el.textContent = text;
        }
    }

    function resetTimeline() {
        setTimelineNode(timelinePlanEl, '', 'plan');
        setTimelineNode(timelineApprovalEl, '', 'approval');
        setTimelineNode(timelineExecuteEl, '', 'execute');
        setTimelineNode(timelineEndEl, '', 'end');
        timelineMetaEl.textContent = '';
    }

    function stopTimelinePolling() {
        if (timelinePollingTimer) {
            clearInterval(timelinePollingTimer);
            timelinePollingTimer = null;
        }
    }

    function renderTimeline(detail) {
        const task = detail && detail.task ? detail.task : {};
        const steps = detail && Array.isArray(detail.steps) ? detail.steps : [];
        const taskStatus = task && task.status ? task.status : '';

        const hasPlan = steps.some((x) => x && x.stepStatus === 'PLANNED');
        const hasDone = steps.some((x) => x && x.stepStatus === 'DONE');
        const needsApproval = steps.some((x) => x && x.actionType === 'CREATE_TICKET');

        const planState = hasPlan ? 'done' : (taskStatus ? 'active' : '');

        let approvalState = '';
        let approvalText = 'approval';
        if (needsApproval) {
            if (taskStatus === 'WAITING_APPROVAL') {
                approvalState = 'active';
            } else if (hasDone || taskStatus === 'COMPLETED' || taskStatus === 'FAILED') {
                approvalState = 'done';
            } else if (hasPlan) {
                approvalState = 'active';
            }
        } else if (taskStatus === 'COMPLETED' || taskStatus === 'FAILED') {
            approvalState = 'done';
            approvalText = 'approval(skipped)';
        }

        const executeState = hasDone ? 'done' : (hasPlan && taskStatus === 'RUNNING' ? 'active' : '');
        const endState = (taskStatus === 'COMPLETED' || taskStatus === 'FAILED') ? 'done' : '';

        setTimelineNode(timelinePlanEl, planState, 'plan');
        setTimelineNode(timelineApprovalEl, approvalState, approvalText);
        setTimelineNode(timelineExecuteEl, executeState, 'execute');
        setTimelineNode(timelineEndEl, endState, 'end');

        timelineMetaEl.textContent = `taskId: ${task.taskId || activeTaskId || '-'}
status: ${taskStatus || '-'}
steps: ${steps.length}`;
    }

    async function refreshTimeline(taskId) {
        if (!taskId) {
            return null;
        }
        const response = await fetch(`/api/chat/agent/tasks/${encodeURIComponent(taskId)}`);
        const contentType = response.headers.get('content-type') || '';
        const payload = contentType.includes('application/json') ? await response.json() : await response.text();
        parseResponsePayload(response, payload);
        if (payload && typeof payload === 'object') {
            renderTimeline(payload);
        }
        return payload;
    }

    function ensureTimelinePolling(taskId) {
        stopTimelinePolling();
        timelinePollingTimer = setInterval(async () => {
            try {
                const payload = await refreshTimeline(taskId);
                const status = payload && payload.task ? payload.task.status : '';
                if (status === 'COMPLETED' || status === 'FAILED') {
                    stopTimelinePolling();
                }
            } catch (e) {
                stopTimelinePolling();
            }
        }, 2000);
    }

    resetTimeline();
    uploadBtn.addEventListener('click', async () => {
        const file = fileInput.files && fileInput.files[0];
        const docType = docTypeSelect.value;
        if (!file) {
            setStatus(uploadStatusEl, '\u8bf7\u5148\u9009\u62e9\u6587\u4ef6', 'err');
            return;
        }
        if (!docType) {
            setStatus(uploadStatusEl, '\u8bf7\u9009\u62e9\u6587\u6863\u7c7b\u578b', 'err');
            return;
        }

        uploadBtn.disabled = true;
        setStatus(uploadStatusEl, '\u6b63\u5728\u4e0a\u4f20...');

        try {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('docType', docType);

            const response = await fetch('/api/documents/upload', {
                method: 'POST',
                body: formData
            });

            const contentType = response.headers.get('content-type') || '';
            const payload = contentType.includes('application/json') ? await response.json() : await response.text();
            parseResponsePayload(response, payload);

            const okMsg = typeof payload === 'string'
                ? payload
                : `\u4e0a\u4f20\u6210\u529f: ${payload.fileName || file.name}\uff0c\u7c7b\u578b: ${payload.docType || docType}`;
            setStatus(uploadStatusEl, okMsg, 'ok');
        } catch (e) {
            setStatus(uploadStatusEl, `\u4e0a\u4f20\u5931\u8d25: ${e.message}`, 'err');
        } finally {
            uploadBtn.disabled = false;
        }
    });

    async function approveAgentAction(token) {
        const response = await fetch(`/api/chat/agent/approve?token=${encodeURIComponent(token)}`, {
            method: 'POST'
        });

        const contentType = response.headers.get('content-type') || '';
        const payload = contentType.includes('application/json') ? await response.json() : await response.text();
        parseResponsePayload(response, payload);
        return payload;
    }

    async function clarifyAgentTask(taskId, message) {
        const response = await fetch('/api/chat/agent/clarify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ taskId, message })
        });

        const contentType = response.headers.get('content-type') || '';
        const payload = contentType.includes('application/json') ? await response.json() : await response.text();
        parseResponsePayload(response, payload);
        return payload;
    }

    function buildAssistantText(payload) {
        const answer = typeof payload === 'string' ? payload : (payload.answer || 'Agent \u672a\u8fd4\u56de\u5185\u5bb9');
        const intentType = payload && payload.intentType ? `\n\u610f\u56fe: ${payload.intentType}` : '';
        const tools = payload && payload.usedTools && payload.usedTools.length
            ? `\n\u4f7f\u7528\u5de5\u5177: ${payload.usedTools.join(', ')}`
            : '';
        return `${answer}${intentType}${tools}`;
    }

    async function handleAgentPayload(payload) {
        appendMessage('assistant', buildAssistantText(payload));

        if (payload && payload.taskId) {
            activeTaskId = payload.taskId;
            try {
                const detail = await refreshTimeline(activeTaskId);
                const status = detail && detail.task ? detail.task.status : '';
                if (status !== 'COMPLETED' && status !== 'FAILED') {
                    ensureTimelinePolling(activeTaskId);
                } else {
                    stopTimelinePolling();
                }
            } catch (e) {
                // ignore timeline fetch error for main interaction flow
            }
        }

        if (payload && payload.approvalRequired && payload.approvalToken) {
            const confirmed = window.confirm('Agent \u8bf7\u6c42\u6267\u884c\u654f\u611f\u64cd\u4f5c\uff0c\u662f\u5426\u786e\u8ba4\u7ee7\u7eed\uff1f');
            if (!confirmed) {
                setStatus(chatStatusEl, '\u4f60\u5df2\u53d6\u6d88\u5ba1\u6279\u6267\u884c', 'ok');
                return;
            }

            setStatus(chatStatusEl, '\u5df2\u786e\u8ba4\uff0c\u6b63\u5728\u6267\u884c\u5ba1\u6279...');
            const approvePayload = await approveAgentAction(payload.approvalToken);
            await handleAgentPayload(approvePayload);
            return;
        }

        if (payload && payload.clarificationRequired && payload.taskId) {
            pendingClarificationTaskId = payload.taskId;
            setStatus(chatStatusEl, '\u8bf7\u76f4\u63a5\u5728\u8f93\u5165\u6846\u8865\u5145\u6f84\u6e05\u4fe1\u606f\u540e\u53d1\u9001\uff0c\u7cfb\u7edf\u5c06\u7ee7\u7eed\u6267\u884c\u3002', 'ok');
            messageInput.placeholder = '\u8bf7\u8865\u5145\u6f84\u6e05\u4fe1\u606f\uff08\u4f8b\u5982\uff1a\u95ee\u9898\u73b0\u8c61\u3001\u5f71\u54cd\u8303\u56f4\u3001\u671f\u671b\u52a8\u4f5c\uff09';
            messageInput.focus();
            return;
        }

        pendingClarificationTaskId = null;
        messageInput.placeholder = '\u8bf7\u8f93\u5165\u4f60\u7684\u95ee\u9898';
        setStatus(chatStatusEl, 'Agent \u95ee\u7b54\u5b8c\u6210', 'ok');
    }

    async function sendAgentAsk() {
        const message = messageInput.value.trim();
        if (!message) {
            setStatus(chatStatusEl, '\u8bf7\u8f93\u5165\u6d88\u606f\u5185\u5bb9', 'err');
            return;
        }

        try {
            const userId = resolveUserId();
            agentAskBtn.disabled = true;
            appendMessage('user', message);

            let payload;
            if (!pendingClarificationTaskId) {
                activeTaskId = null;
                resetTimeline();
                stopTimelinePolling();
            }
            if (pendingClarificationTaskId) {
                setStatus(chatStatusEl, '\u6b63\u5728\u63d0\u4ea4\u6f84\u6e05\u4fe1\u606f\u5e76\u7ee7\u7eed\u6267\u884c...');
                payload = await clarifyAgentTask(pendingClarificationTaskId, message);
            } else {
                setStatus(chatStatusEl, 'Agent \u95ee\u7b54\u5904\u7406\u4e2d...');
                const response = await fetch('/api/chat/agent/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, message })
                });

                const contentType = response.headers.get('content-type') || '';
                payload = contentType.includes('application/json') ? await response.json() : await response.text();
                parseResponsePayload(response, payload);
            }

            await handleAgentPayload(payload);
            messageInput.value = '';
        } catch (e) {
            appendMessage('assistant', `\u8bf7\u6c42\u5931\u8d25: ${e.message}`);
            setStatus(chatStatusEl, `Agent \u95ee\u7b54\u5931\u8d25: ${e.message}`, 'err');
        } finally {
            agentAskBtn.disabled = false;
            messageInput.focus();
        }
    }

    agentAskBtn.addEventListener('click', sendAgentAsk);

    messageInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendAgentAsk();
        }
    });
</script>
</body>
</html>
