<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>企业知识助手</title>
    <style>
        :root {
            --bg: #f2f6fb;
            --card: #ffffff;
            --text: #14213d;
            --muted: #4f5d75;
            --primary: #1565c0;
            --primary-hover: #0d47a1;
            --danger: #b00020;
            --ok: #1b5e20;
            --border: #d6deeb;
            --assistant-bg: #f0f7ff;
            --user-bg: #ecf7ec;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top left, #dfe9f5 0%, var(--bg) 45%, #edf3fb 100%);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 16px;
        }

        .app-title {
            width: 100%;
            max-width: 760px;
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 1px;
            margin: 0 0 8px;
            text-align: left;
        }

        .container {
            width: 100%;
            max-width: 760px;
            display: grid;
            gap: 16px;
        }

        .card {
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 14px 30px rgba(10, 41, 78, 0.08);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 22px;
        }

        p {
            margin: 0 0 16px;
            color: var(--muted);
            font-size: 14px;
        }

        .row {
            display: grid;
            gap: 12px;
        }

        input[type="file"],
        input[type="text"],
        select,
        textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            background: #fbfdff;
            font-size: 14px;
            color: var(--text);
        }

        input[type="file"] {
            border-style: dashed;
        }

        textarea {
            resize: vertical;
            min-height: 90px;
        }

        button {
            border: 0;
            border-radius: 10px;
            padding: 12px 16px;
            background: var(--primary);
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover:enabled { background: var(--primary-hover); }
        button:disabled { opacity: 0.65; cursor: not-allowed; }

        .status {
            margin-top: 10px;
            min-height: 20px;
            font-size: 14px;
            color: var(--muted);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .status.ok { color: var(--ok); }
        .status.err { color: var(--danger); }

        .chat-log {
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #fbfdff;
            padding: 12px;
            min-height: 220px;
            max-height: 360px;
            overflow-y: auto;
            display: grid;
            gap: 10px;
        }

        .msg {
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .msg.user {
            background: var(--user-bg);
            border: 1px solid #cde8cd;
        }

        .msg.assistant {
            background: var(--assistant-bg);
            border: 1px solid #cadff5;
        }

        .msg .role {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .chat-actions {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: end;
        }

        @media (max-width: 640px) {
            .card { padding: 16px; }
            .chat-actions { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<h1 class="app-title">企业知识助手系统</h1>
<div class="container">
    <div class="card">
        <h1>文档上传</h1>
        <p>上传文档到 <code>/api/documents/upload</code> 做知识入库。</p>

        <div class="row">
            <input id="fileInput" type="file" />
            <select id="docTypeSelect">
                <option value="POLICY">POLICY</option>
                <option value="TECH_TYPE">TECH_TYPE</option>
                <option value="SOP">SOP</option>
                <option value="FAQ">FAQ</option>
            </select>
            <button id="uploadBtn" type="button">上传文档</button>
        </div>

        <div id="uploadStatus" class="status"></div>
    </div>

    <div class="card">
        <h1>模型对话</h1>
        <p>调用 <code>/api/chat/dialogue</code>，同一 <code>userId</code> 自动保持多轮记忆。</p>

        <div class="row">
            <input id="userIdInput" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="请输入数字 userId（留空默认 666）" />
            <div id="chatLog" class="chat-log"></div>
            <div class="chat-actions">
                <textarea id="messageInput" placeholder="请输入你的问题"></textarea>
                <button id="sendBtn" type="button">发送</button>
            </div>
        </div>

        <div id="chatStatus" class="status"></div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const uploadStatusEl = document.getElementById('uploadStatus');
    const docTypeSelect = document.getElementById('docTypeSelect');

    const userIdInput = document.getElementById('userIdInput');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const chatLog = document.getElementById('chatLog');
    const chatStatusEl = document.getElementById('chatStatus');

    function setStatus(el, text, type) {
        el.textContent = text;
        el.className = 'status';
        if (type) {
            el.classList.add(type);
        }
    }

    function appendMessage(role, content) {
        const item = document.createElement('div');
        item.className = `msg ${role}`;

        const roleEl = document.createElement('span');
        roleEl.className = 'role';
        roleEl.textContent = role === 'user' ? '你' : '助手';

        const contentEl = document.createElement('div');
        contentEl.textContent = content;

        item.appendChild(roleEl);
        item.appendChild(contentEl);
        chatLog.appendChild(item);
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    uploadBtn.addEventListener('click', async () => {
        const file = fileInput.files && fileInput.files[0];
        const docType = docTypeSelect.value;
        if (!file) {
            setStatus(uploadStatusEl, '请先选择文件', 'err');
            return;
        }
        if (!docType) {
            setStatus(uploadStatusEl, '请选择文档类型', 'err');
            return;
        }

        uploadBtn.disabled = true;
        setStatus(uploadStatusEl, '正在上传...');

        try {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('docType', docType);

            const response = await fetch('/api/documents/upload', {
                method: 'POST',
                body: formData
            });

            const contentType = response.headers.get('content-type') || '';
            let payload;
            if (contentType.includes('application/json')) {
                payload = await response.json();
            } else {
                payload = await response.text();
            }

            if (!response.ok) {
                const errMsg = typeof payload === 'string' ? payload : JSON.stringify(payload);
                throw new Error(errMsg || '上传失败');
            }

            const okMsg = typeof payload === 'string'
                ? payload
                : `上传成功: ${payload.fileName || file.name}，类型: ${payload.docType || docType}`;
            setStatus(uploadStatusEl, okMsg, 'ok');
        } catch (e) {
            setStatus(uploadStatusEl, `上传失败: ${e.message}`, 'err');
        } finally {
            uploadBtn.disabled = false;
        }
    });

    async function sendMessage() {
        let userId = userIdInput.value.trim();
        const message = messageInput.value.trim();

        if (!userId) {
            userId = '666';
            userIdInput.value = userId;
        }

        if (!/^\d+$/.test(userId)) {
            setStatus(chatStatusEl, 'userId 只能是数字', 'err');
            return;
        }

        if (!message) {
            setStatus(chatStatusEl, '请输入消息内容', 'err');
            return;
        }

        sendBtn.disabled = true;
        appendMessage('user', message);
        setStatus(chatStatusEl, '正在生成回复...');

        try {
            const response = await fetch('/api/chat/dialogue', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ userId, message })
            });

            const contentType = response.headers.get('content-type') || '';
            let payload;
            if (contentType.includes('application/json')) {
                payload = await response.json();
            } else {
                payload = await response.text();
            }

            if (!response.ok) {
                const errMsg = typeof payload === 'string' ? payload : JSON.stringify(payload);
                throw new Error(errMsg || '对话失败');
            }

            const answer = typeof payload === 'string' ? payload : (payload.answer || '');
            appendMessage('assistant', answer || '模型未返回内容');
            setStatus(chatStatusEl, '回复成功', 'ok');
            messageInput.value = '';
        } catch (e) {
            appendMessage('assistant', `请求失败: ${e.message}`);
            setStatus(chatStatusEl, `对话失败: ${e.message}`, 'err');
        } finally {
            sendBtn.disabled = false;
            messageInput.focus();
        }
    }

    sendBtn.addEventListener('click', sendMessage);

    messageInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
        }
    });
</script>
</body>
</html>
