<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>企业知识助手</title>
    <style>
        :root {
            --bg: #f2f6fb;
            --card: #ffffff;
            --text: #14213d;
            --muted: #4f5d75;
            --primary: #1565c0;
            --primary-hover: #0d47a1;
            --secondary: #197a43;
            --secondary-hover: #0f5a2f;
            --danger: #b00020;
            --ok: #1b5e20;
            --border: #d6deeb;
            --assistant-bg: #f0f7ff;
            --user-bg: #ecf7ec;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top left, #dfe9f5 0%, var(--bg) 45%, #edf3fb 100%);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 16px;
        }

        .app-title {
            width: 100%;
            max-width: 760px;
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 1px;
            margin: 0 0 8px;
            text-align: left;
        }

        .container {
            width: 100%;
            max-width: 760px;
            display: grid;
            gap: 16px;
        }

        .card {
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 14px 30px rgba(10, 41, 78, 0.08);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 22px;
        }

        p {
            margin: 0 0 16px;
            color: var(--muted);
            font-size: 14px;
        }

        .row {
            display: grid;
            gap: 12px;
        }

        input[type="file"],
        input[type="text"],
        select,
        textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            background: #fbfdff;
            font-size: 14px;
            color: var(--text);
        }

        input[type="file"] {
            border-style: dashed;
        }

        textarea {
            resize: vertical;
            min-height: 90px;
        }

        button {
            border: 0;
            border-radius: 10px;
            padding: 12px 16px;
            background: var(--primary);
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .btn-secondary {
            background: var(--secondary);
        }

        button:hover:enabled { background: var(--primary-hover); }
        .btn-secondary:hover:enabled { background: var(--secondary-hover); }
        button:disabled { opacity: 0.65; cursor: not-allowed; }

        .status {
            margin-top: 10px;
            min-height: 20px;
            font-size: 14px;
            color: var(--muted);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .status.ok { color: var(--ok); }
        .status.err { color: var(--danger); }

        .chat-log {
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #fbfdff;
            padding: 12px;
            min-height: 220px;
            max-height: 360px;
            overflow-y: auto;
            display: grid;
            gap: 10px;
        }

        .msg {
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .msg.user {
            background: var(--user-bg);
            border: 1px solid #cde8cd;
        }

        .msg.assistant {
            background: var(--assistant-bg);
            border: 1px solid #cadff5;
        }

        .msg .role {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .chat-buttons {
            display: grid;
            grid-template-columns: repeat(2, minmax(120px, 1fr));
            gap: 12px;
        }

        @media (max-width: 640px) {
            .card { padding: 16px; }
            .chat-buttons { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<h1 class="app-title">企业知识助手系统</h1>
<div class="container">
    <div class="card">
        <h1>文档上传</h1>
        <p>上传文档到 <code>/api/documents/upload</code> 做知识入库。</p>

        <div class="row">
            <input id="fileInput" type="file" />
            <select id="docTypeSelect">
                <option value="POLICY">POLICY</option>
                <option value="TECH_TYPE">TECH_TYPE</option>
                <option value="SOP">SOP</option>
                <option value="FAQ">FAQ</option>
            </select>
            <button id="uploadBtn" type="button">上传文档</button>
        </div>

        <div id="uploadStatus" class="status"></div>
    </div>

    <div class="card">
        <h1>模型对话</h1>
        <p>
            Agent 问答：<code>/api/chat/agent/ask</code><br/>
            审批接口：<code>/api/chat/agent/approve</code>（Agent 返回 ACTION_REQUEST 后会弹窗确认）
        </p>

        <div class="row">
            <input id="userIdInput" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="请输入数字 userId（留空默认 666）" />
            <div id="chatLog" class="chat-log"></div>
            <textarea id="messageInput" placeholder="请输入你的问题"></textarea>
            <div class="chat-buttons">
                <button id="agentAskBtn" type="button" class="btn-secondary">Agent 问答</button>
            </div>
        </div>

        <div id="chatStatus" class="status"></div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const uploadStatusEl = document.getElementById('uploadStatus');
    const docTypeSelect = document.getElementById('docTypeSelect');

    const userIdInput = document.getElementById('userIdInput');
    const messageInput = document.getElementById('messageInput');
    const agentAskBtn = document.getElementById('agentAskBtn');
    const chatLog = document.getElementById('chatLog');
    const chatStatusEl = document.getElementById('chatStatus');

    function setStatus(el, text, type) {
        el.textContent = text;
        el.className = 'status';
        if (type) {
            el.classList.add(type);
        }
    }

    function appendMessage(role, content) {
        const item = document.createElement('div');
        item.className = `msg ${role}`;

        const roleEl = document.createElement('span');
        roleEl.className = 'role';
        roleEl.textContent = role === 'user' ? '你' : '助手';

        const contentEl = document.createElement('div');
        contentEl.textContent = content;

        item.appendChild(roleEl);
        item.appendChild(contentEl);
        chatLog.appendChild(item);
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    function parseResponsePayload(response, payload) {
        if (!response.ok) {
            const errMsg = typeof payload === 'string' ? payload : JSON.stringify(payload);
            throw new Error(errMsg || '请求失败');
        }
        return payload;
    }

    function resolveUserId() {
        let userId = userIdInput.value.trim();
        if (!userId) {
            userId = '666';
            userIdInput.value = userId;
        }
        if (!/^\d+$/.test(userId)) {
            throw new Error('userId 只能是数字');
        }
        return userId;
    }

    uploadBtn.addEventListener('click', async () => {
        const file = fileInput.files && fileInput.files[0];
        const docType = docTypeSelect.value;
        if (!file) {
            setStatus(uploadStatusEl, '请先选择文件', 'err');
            return;
        }
        if (!docType) {
            setStatus(uploadStatusEl, '请选择文档类型', 'err');
            return;
        }

        uploadBtn.disabled = true;
        setStatus(uploadStatusEl, '正在上传...');

        try {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('docType', docType);

            const response = await fetch('/api/documents/upload', {
                method: 'POST',
                body: formData
            });

            const contentType = response.headers.get('content-type') || '';
            const payload = contentType.includes('application/json') ? await response.json() : await response.text();
            parseResponsePayload(response, payload);

            const okMsg = typeof payload === 'string'
                ? payload
                : `上传成功: ${payload.fileName || file.name}，类型: ${payload.docType || docType}`;
            setStatus(uploadStatusEl, okMsg, 'ok');
        } catch (e) {
            setStatus(uploadStatusEl, `上传失败: ${e.message}`, 'err');
        } finally {
            uploadBtn.disabled = false;
        }
    });

    async function approveAgentAction(token) {
        const response = await fetch(`/api/chat/agent/approve?token=${encodeURIComponent(token)}`, {
            method: 'POST'
        });

        const contentType = response.headers.get('content-type') || '';
        const payload = contentType.includes('application/json') ? await response.json() : await response.text();
        parseResponsePayload(response, payload);

        return typeof payload === 'string' ? payload : (payload.answer || '审批执行完成');
    }

    async function sendAgentAsk() {
        const message = messageInput.value.trim();
        if (!message) {
            setStatus(chatStatusEl, '请输入消息内容', 'err');
            return;
        }

        try {
            const userId = resolveUserId();
            agentAskBtn.disabled = true;
            appendMessage('user', message);
            setStatus(chatStatusEl, 'Agent 问答处理中...');

            const response = await fetch('/api/chat/agent/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, message })
            });

            const contentType = response.headers.get('content-type') || '';
            const payload = contentType.includes('application/json') ? await response.json() : await response.text();
            parseResponsePayload(response, payload);

            const answer = typeof payload === 'string' ? payload : (payload.answer || 'Agent 未返回内容');
            const intentType = payload && payload.intentType ? `\n意图: ${payload.intentType}` : '';
            const tools = payload && payload.usedTools && payload.usedTools.length
                ? `\n使用工具: ${payload.usedTools.join(', ')}`
                : '';

            appendMessage('assistant', `${answer}${intentType}${tools}`);

            if (payload && payload.intentType === 'ACTION_REQUEST') {
                if (payload.approvalRequired && payload.approvalToken) {
                    const confirmed = window.confirm('Agent 请求执行敏感操作，是否确认继续？');
                    if (confirmed) {
                        setStatus(chatStatusEl, '已确认，正在执行审批...');
                        const approveAnswer = await approveAgentAction(payload.approvalToken);
                        appendMessage('assistant', approveAnswer);
                        setStatus(chatStatusEl, '审批执行完成', 'ok');
                    } else {
                        setStatus(chatStatusEl, '你已取消审批执行', 'ok');
                    }
                } else {
                    setStatus(chatStatusEl, '当前 ACTION_REQUEST 无需审批或未返回 token', 'ok');
                }
            } else {
                setStatus(chatStatusEl, 'Agent 问答完成', 'ok');
            }

            messageInput.value = '';
        } catch (e) {
            appendMessage('assistant', `请求失败: ${e.message}`);
            setStatus(chatStatusEl, `Agent 问答失败: ${e.message}`, 'err');
        } finally {
            agentAskBtn.disabled = false;
            messageInput.focus();
        }
    }

    agentAskBtn.addEventListener('click', sendAgentAsk);

    messageInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendAgentAsk();
        }
    });
</script>
</body>
</html>
